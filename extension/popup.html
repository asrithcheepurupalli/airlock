<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <style>
      @font-face {
        font-family: "Fraunces"; src: url("fonts/Fraunces.ttf") format("truetype");
        font-weight: 100 900; font-style: normal; font-display: swap;
      }
      @font-face {
        font-family: "Fraunces"; src: url("fonts/Fraunces-Italic.ttf") format("truetype");
        font-weight: 100 900; font-style: italic; font-display: swap;
      }
      :root {
        --paper: #f6f3ee; --card: #fbfaf6; --ink: #0b0b0c; --grey: #7c7770;
        --line: #ddd5c8; --red: #c8102e; --ok: #15803d;
        --sans: ui-sans-serif, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", sans-serif;
        --mono: ui-monospace, "SF Mono", Menlo, monospace;
      }
      * { box-sizing: border-box; }
      body {
        width: 372px; margin: 0; padding: 20px 20px 16px; background: var(--paper);
        color: var(--ink); font: 13px/1.55 var(--sans); -webkit-font-smoothing: antialiased;
      }
      .mark { font-family: "Fraunces", Georgia, serif; font-style: italic; font-weight: 600;
        font-size: 26px; letter-spacing: -0.01em; line-height: 1; }
      .mark .dot { font-style: normal; color: var(--red); }
      .sub { color: var(--grey); margin: 8px 0 18px; font-size: 12.5px; }

      label { display: block; font-weight: 600; font-size: 12px; margin: 0 0 7px; }
      label .hint { font-weight: 400; color: var(--grey); }
      .field { margin-bottom: 16px; }

      textarea, input {
        width: 100%; border: 1px solid var(--line); border-radius: 12px; background: var(--card);
        color: var(--ink); padding: 11px 13px; font: 13px/1.5 var(--sans); resize: vertical;
        transition: border-color 0.18s ease, box-shadow 0.18s ease;
      }
      textarea { min-height: 96px; }
      textarea::placeholder, input::placeholder { color: #b3ac9f; }
      textarea:focus, input:focus { outline: none; border-color: #b9c7bb;
        box-shadow: 0 0 0 3px rgba(21, 128, 61, 0.12); }

      .row { display: flex; justify-content: space-between; align-items: center; margin: 4px 0 9px; }
      .badge { font-size: 11.5px; font-weight: 600; color: var(--grey); border: 1px solid var(--line);
        background: #fff; border-radius: 999px; padding: 3px 11px; transition: all 0.2s ease; }
      .badge.hit { color: var(--ok); border-color: #bcd6bf; background: #eef5ee; }

      button.copy {
        border: none; background: var(--ink); color: var(--paper); border-radius: 10px;
        padding: 8px 14px; font: 600 12.5px var(--sans); cursor: pointer;
        transition: transform 0.12s ease, background 0.2s ease, box-shadow 0.2s ease;
      }
      button.copy:hover { background: #1c1b18; box-shadow: 0 6px 18px rgba(11, 11, 12, 0.22); }
      button.copy:active { transform: scale(0.95); }
      button.copy.done { background: var(--ok); }

      .out {
        border: 1px solid var(--line); border-radius: 12px; background: #f6f8f5; padding: 12px 13px;
        min-height: 58px; white-space: pre-wrap; word-break: break-word; font-family: var(--mono);
        font-size: 12px; line-height: 1.6; color: var(--ink);
      }
      .out:empty::before { content: "Your redacted version appears here."; color: #b3ac9f; font-style: italic; }

      .foot { color: var(--grey); font-size: 11px; line-height: 1.5; margin: 14px 0 0;
        padding-top: 12px; border-top: 1px solid var(--line); }
    </style>
  </head>
  <body>
    <div class="mark">airlock<span class="dot">.</span></div>
    <p class="sub">Redact before you paste. Nothing here leaves your machine.</p>

    <div class="field">
      <label for="in">Paste anything sensitive</label>
      <textarea id="in" spellcheck="false" placeholder="Paste a message with a name, email, or API key…"></textarea>
    </div>

    <div class="field">
      <label for="terms">Sensitive terms <span class="hint">client or project names, comma-separated</span></label>
      <input id="terms" placeholder="Acme Health Systems, Project Falcon" />
    </div>

    <div class="row">
      <span class="badge" id="count">0 found</span>
      <button class="copy" id="copy">Copy redacted</button>
    </div>
    <div class="out" id="out"></div>

    <p class="foot">Detection runs in this popup. This extension requests no network
      permission and makes no requests of its own.</p>

    <script src="redact.js"></script>
    <script src="popup.js"></script>
  </body>
</html>
