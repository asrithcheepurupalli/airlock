<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <style>
      :root { --bg:#f4f1ea; --ink:#1a1a17; --muted:#6b6b63; --line:#ddd8cc; --ok:#15803d; }
      * { box-sizing: border-box; }
      body { width: 380px; margin: 0; background: var(--bg); color: var(--ink);
        font: 13px/1.5 ui-sans-serif, -apple-system, "Segoe UI", Roboto, sans-serif; padding: 14px; }
      .mark { font-size: 18px; font-weight: 600; font-style: italic; letter-spacing: -0.02em; }
      .mark .dot { font-style: normal; color: #c8102e; }
      .sub { color: var(--muted); margin: 4px 0 12px; }
      label { display: block; font-weight: 600; font-size: 12px; margin: 12px 0 5px; }
      textarea, input { width: 100%; border: 1px solid var(--line); border-radius: 8px;
        background: #fbfaf6; color: var(--ink); padding: 9px 10px; font: inherit; resize: vertical; }
      .out { border: 1px solid var(--line); border-radius: 8px; background: #f6f8f5;
        padding: 9px 10px; min-height: 54px; white-space: pre-wrap; word-break: break-word;
        font-family: ui-monospace, "SF Mono", Menlo, monospace; font-size: 12px; }
      .row { display: flex; justify-content: space-between; align-items: center; margin: 10px 0 5px; }
      .badge { font-size: 11px; color: var(--ok); border: 1px solid #bcd6bf; background: #eef5ee;
        border-radius: 999px; padding: 2px 8px; }
      .foot { color: var(--muted); font-size: 11px; margin-top: 12px; padding-top: 10px; border-top: 1px solid var(--line); }
      button.copy { border: none; background: var(--ink); color: var(--bg); border-radius: 7px;
        padding: 5px 11px; font: 600 12px ui-sans-serif, sans-serif; cursor: pointer; }
    </style>
  </head>
  <body>
    <div class="mark">airlock<span class="dot">.</span></div>
    <div class="sub">Redact before you paste. Nothing here leaves your machine.</div>

    <label>Paste anything sensitive</label>
    <textarea id="in" rows="5" spellcheck="false"></textarea>

    <label>Sensitive terms <span style="font-weight:400;color:var(--muted)">(client / project names, comma-separated)</span></label>
    <input id="terms" placeholder="Acme Health Systems, Project Falcon" />

    <div class="row">
      <span class="badge" id="count">0 found</span>
      <button class="copy" id="copy">Copy redacted</button>
    </div>
    <div class="out" id="out"></div>

    <div class="foot">Detection runs in this popup. This extension requests no network
      permission and makes no requests of its own.</div>

    <script src="redact.js"></script>
    <script src="popup.js"></script>
  </body>
</html>
