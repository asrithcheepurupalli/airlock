<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <rect width="1200" height="630" fill="#f6f3ee"/>

  <!-- product mark -->
  <g transform="translate(70,64)">
    <rect width="76" height="76" rx="17" fill="#0b0b0c"/>
    <rect x="17" y="22" width="24" height="8" rx="4" fill="#f6f3ee" opacity="0.92"/>
    <rect x="45" y="22" width="14" height="8" rx="4" fill="#c8102e"/>
    <rect x="17" y="34" width="20" height="8" rx="4" fill="#c8102e"/>
    <rect x="41" y="34" width="18" height="8" rx="4" fill="#f6f3ee" opacity="0.92"/>
    <rect x="17" y="46" width="28" height="8" rx="4" fill="#f6f3ee" opacity="0.92"/>
  </g>
  <text x="166" y="98" font-family="Fraunces" font-style="italic" font-weight="600" font-size="40" fill="#0b0b0c">airlock<tspan font-style="normal" fill="#c8102e">.</tspan></text>
  <text x="166" y="128" font-family="Helvetica, Arial, sans-serif" font-size="17" fill="#3a3a34">A <tspan font-family="Fraunces" font-style="italic" font-weight="600">made<tspan fill="#c8102e">.</tspan></tspan> product</text>

  <!-- headline -->
  <text x="70" y="248" font-family="Fraunces" font-weight="500" font-size="62" fill="#0b0b0c">The AI you use should never</text>
  <text x="70" y="318" font-family="Fraunces" font-weight="500" font-size="62" fill="#0b0b0c">see your client's name.</text>
  <text x="70" y="372" font-family="Helvetica, Arial, sans-serif" font-size="23" fill="#3a3a34">Sensitive data is stripped on your device before it reaches ChatGPT or Claude.</text>

  <!-- before / after -->
  <g font-family="Menlo, monospace" font-size="19">
    <rect x="70" y="424" width="510" height="138" rx="16" fill="#fbfaf6" stroke="#ddd5c8" stroke-width="2"/>
    <text x="98" y="464" font-family="Helvetica, Arial, sans-serif" font-size="13" letter-spacing="1.5" fill="#c8102e">WITHOUT AIRLOCK</text>
    <text x="98" y="500" fill="#0b0b0c">My client <tspan fill="#c8102e">Dana Reyes</tspan>,</text>
    <text x="98" y="528" fill="#c8102e">dana.reyes@acmehealth.com</text>

    <rect x="620" y="424" width="510" height="138" rx="16" fill="#f6f8f5" stroke="#bcd6bf" stroke-width="2"/>
    <text x="648" y="464" font-family="Helvetica, Arial, sans-serif" font-size="13" letter-spacing="1.5" fill="#15803d">WITH AIRLOCK</text>
    <text x="648" y="500" fill="#0b0b0c">My client <tspan fill="#15803d">[NAME_1]</tspan>,</text>
    <text x="648" y="528" fill="#15803d">[EMAIL_1]</text>
  </g>
</svg>
